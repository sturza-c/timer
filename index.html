<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timer 20 min</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #f4f3f1;
    font-family: 'Cormorant Garamond', serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .timer {
    font-size: clamp(80px, 20vw, 160px);
    font-weight: 300;
    color: #3a3a3a;
    letter-spacing: 0.05em;
    line-height: 1;
    transition: color 0.5s;
  }

  .timer.warning { color: #b8860b; }
  .timer.urgent  { color: #8b2020; }

  .bar-wrap {
    width: 60%;
    max-width: 400px;
    height: 3px;
    background: #ddd;
    margin-top: 32px;
    border-radius: 2px;
    overflow: hidden;
  }

  .bar {
    height: 100%;
    width: 100%;
    background: #3a3a3a;
    transform-origin: left;
    transition: transform 1s linear, background 0.5s;
  }

  .bar.warning { background: #b8860b; }
  .bar.urgent  { background: #8b2020; }

  .btn {
    margin-top: 40px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    letter-spacing: 0.1em;
    padding: 12px 40px;
    border: 1px solid #3a3a3a;
    background: #3a3a3a;
    color: #f4f3f1;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn:hover { background: transparent; color: #3a3a3a; }

  .done {
    display: none;
    font-size: clamp(40px, 10vw, 80px);
    font-weight: 600;
    color: #3a3a3a;
    animation: pulse 1.2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%,100% { opacity:1; }
    50%      { opacity:0.4; }
  }
</style>
</head>
<body>

<div class="timer" id="t">20:00</div>
<div class="bar-wrap"><div class="bar" id="bar"></div></div>
<button class="btn" id="btn" onclick="toggle()">Démarrer</button>
<div class="done" id="done">Reprise !</div>

<script>
  const TOTAL = 20 * 60;
  let left = TOTAL, iv = null, running = false;

  const tEl  = document.getElementById('t');
  const bar  = document.getElementById('bar');
  const btn  = document.getElementById('btn');
  const done = document.getElementById('done');

  function fmt(s) {
    return `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
  }

  function update() {
    tEl.textContent = fmt(left);
    const pct = left / TOTAL;
    bar.style.transform = `scaleX(${pct})`;
    const w = left <= 60, v = left <= 5*60 && !w;
    tEl.className  = 'timer'  + (w?' urgent': v?' warning':'');
    bar.className  = 'bar'    + (w?' urgent': v?' warning':'');
  }

  function toggle() {
    if (running) {
      clearInterval(iv); running = false; btn.textContent = 'Reprendre';
    } else {
      running = true; btn.textContent = 'Pause';
      iv = setInterval(() => {
        left--;
        update();
        if (left <= 0) {
          clearInterval(iv);
          tEl.style.display = 'none';
          document.querySelector('.bar-wrap').style.display = 'none';
          btn.style.display = 'none';
          done.style.display = 'block';
        }
      }, 1000);
    }
  }

  update();
</script>
</body>
</html>
